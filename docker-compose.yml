services:
  db:
    image: postgres:16-alpine
    container_name: gitscope-db
    restart: always
    environment:
      - POSTGRES_USER=mayank
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gitscope_db
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayank -d gitscope_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitscope-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mayank:postgres@db:5432/gitscope_db
      - LOG_TO_FILE=false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitscope-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
