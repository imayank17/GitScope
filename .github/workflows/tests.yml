name: E2E Integration Tests

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - '*'

jobs:
  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mayank
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gitscope_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Browsers
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright System Dependencies (If Cached)
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Start Backend Server
        working-directory: backend
        env:
          APP_NAME: GitScope
          APP_VERSION: 1.0.0
          DATABASE_URL: postgresql+asyncpg://mayank:postgres@localhost:5432/gitscope_db
          SECRET_KEY: test_secret_key_for_ci_cd_verification
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "True"
          LOG_TO_FILE: "False"
        run: |
          PYTHONPATH=. python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          
          # Wait for backend to boot up
          echo "Waiting for backend to start..."
          until curl -s http://127.0.0.1:8000/health; do
            echo "Waiting for port 8000..."
            sleep 2
          done
          echo "Backend uvicorn server is up and running!"

      - name: Run Playwright Tests
        working-directory: frontend
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
