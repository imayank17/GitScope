name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
  pull_request:
    branches:
      - '*'

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Black Code Style Check
        run: black --check .

  test:
    name: Pytest & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mayank
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gitscope_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U mayank -d gitscope_db
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio respx aiosqlite

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgresql+asyncpg://mayank:postgres@localhost:5432/gitscope_db
          SECRET_KEY: test_secret_key_for_ci_cd_verification
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "True"
          LOG_TO_FILE: "False"
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=xml

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error
