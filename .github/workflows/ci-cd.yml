name: GitScope CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: write

jobs:
  # --------------------------------------------------------
  # 1. Backend Linting & Styling
  # --------------------------------------------------------
  backend-lint:
    name: Backend Lint & Style
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Black Formatting Check
        run: black --check .

  # --------------------------------------------------------
  # 2. Backend Pytest & Unit Tests
  # --------------------------------------------------------
  backend-test:
    name: Backend Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mayank
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gitscope_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio respx aiosqlite

      - name: Run Pytest Suite
        env:
          APP_NAME: GitScope
          APP_VERSION: 1.0.0
          DATABASE_URL: postgresql+asyncpg://mayank:postgres@localhost:5432/gitscope_db
          SECRET_KEY: test_secret_key_for_ci_cd_verification
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "True"
          LOG_TO_FILE: "False"
        run: |
          PYTHONPATH=. pytest --cov=app --cov-report=xml

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: error

  # --------------------------------------------------------
  # 3. Frontend Quality Verification & Build Check
  # --------------------------------------------------------
  frontend-lint-and-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npx oxlint src

      - name: Verify TypeScript Type Checking
        run: npx tsc -b

      - name: Build Verification
        run: npm run build

  # --------------------------------------------------------
  # 4. End-to-End integration Tests (Playwright)
  # --------------------------------------------------------
  e2e-test:
    name: Playwright E2E Tests
    needs: [backend-test, frontend-lint-and-build]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mayank
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gitscope_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Browsers
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright System Dependencies (If Cached)
        working-directory: frontend
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Start Backend Server
        working-directory: backend
        env:
          APP_NAME: GitScope
          APP_VERSION: 1.0.0
          DATABASE_URL: postgresql+asyncpg://mayank:postgres@localhost:5432/gitscope_db
          SECRET_KEY: test_secret_key_for_ci_cd_verification
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "True"
          LOG_TO_FILE: "False"
        run: |
          PYTHONPATH=. python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          
          # Wait for backend to boot up
          echo "Waiting for backend to start..."
          until curl -s http://127.0.0.1:8000/health; do
            echo "Waiting for port 8000..."
            sleep 2
          done
          echo "Backend uvicorn server is up and running!"

      - name: Run Playwright Tests
        working-directory: frontend
        env:
          CI: "true"
        run: npx playwright test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # --------------------------------------------------------
  # 5. Docker Validation & Dry Run Build
  # --------------------------------------------------------
  docker-validate-and-build:
    name: Docker Validation & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose Configuration
        run: |
          touch backend/.env
          docker compose config

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: gitscope-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: gitscope-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------
  # 6. Push Images to Docker Hub (Merge to Main)
  # --------------------------------------------------------
  docker-publish:
    name: Publish Containers to Docker Hub
    needs: [docker-validate-and-build, e2e-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gitscope-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/gitscope-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gitscope-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/gitscope-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------
  # 7. Release Creation (Push Tags v*)
  # --------------------------------------------------------
  create-release:
    name: Generate GitHub Release
    needs: [e2e-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release Notes & Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
